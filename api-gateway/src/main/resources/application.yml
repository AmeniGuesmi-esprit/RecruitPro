server:
  port: 8222

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: user-service-public
          uri: lb://user-service
          predicates:
            - Path=/api/users/auth/**
          filters:
            - StripPrefix=0

        - id: user-service-files
          uri: lb://user-service
          predicates:
            - Path=/api/users/files/**
          filters:
            - StripPrefix=0

        - id: user-service-protected
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=0
            - AuthenticationFilter

eureka:
  client:
    service-url:
      defaultZone: http://admin:admin123@localhost:8761/eureka/
  instance:
    prefer-ip-address: true

app:
  jwt:
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    expiration: 86400000

logging:
  level:
    org.springframework.cloud.gateway: DEBUG