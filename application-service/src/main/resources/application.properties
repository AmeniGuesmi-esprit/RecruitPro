# Server
server.port=8083

# Application
spring.application.name=application-service

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/recruitment_applications?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Eureka
eureka.client.service-url.defaultZone=http://admin:admin123@localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# JWT (mÍme secret que user-service, job-service et gateway)
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration=86400000

# URL de base exposťe au frontend (via gateway) pour construire les liens de CV
app.base-url=http://localhost:8222

# URL du microservice de matching IA (Python/FastAPI, pas enregistrť dans Eureka)
# En local : http://localhost:8000 ? sous Docker Compose : http://matching-service:8000
app.matching-service.url=http://localhost:8000